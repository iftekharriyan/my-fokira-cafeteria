<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>online Oder</title>

  <style>

    body {
        
        font-family: "Times New Roman", serif;
        background-color: lightgray;
        margin: 0;


        #back-to-home {
        
        background-color: brown;
        color: white;
        text-decoration: none;
        display: inline-block;
        padding: 10px 20px;
        font-size: 18px;
        border: none;
        cursor: pointer;
        margin: 20px 15px;
        }

        #submit {
         background-color: rgb(0, 97, 36);
        color: white;
        text-decoration: none;
        display: inline-block;
        padding: 10px 20px;
        font-size: 18px;
        border: none;
        cursor: pointer;
        margin: 20px 15px;

    </style>
</head>
<body>
    <p style="text-align: center; font-size: 32px;"><strong>Online Order Form</strong></p>
   
<section style="text-align: center; margin-top: 20px; font-size: 24px;">
     <p><strong>Name:</strong></p> <form><input type="text" name="name" required></form>
    <p><strong>Email:</strong></p> <form><input type="email" name="email" required></form>
    <p><strong>Phone:</strong></p> <form><input type="tel" name="phone" required></form>
    <p><strong>Address:</strong></p> <form><textarea name="address" required></textarea></form>
    <p><strong>Order Details:</strong></p> <form><textarea name="order" required></textarea></form>
    <form id="submit"><input type="submit" value="Submit Order"></form>

</section>


    <section style="text-align: center; margin-top: 20px;">
        <a id="back-to-home" href="index.html">Back to Home</a>
    </section>
</body>
</html>
